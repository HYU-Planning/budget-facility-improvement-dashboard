<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 교육환경개선사업 심사 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root{
  --navy:#0B2545;
  --blue:#1B4F8A;
  --sky:#3A86D4;
  --gold:#E8A020;
  --mint:#00B8A0;
  --bg:#F2F4F8;
  --white:#FFFFFF;
  --gray1:#F7F8FA;
  --gray2:#E8ECF2;
  --gray3:#B0BBC8;
  --gray4:#6B7A8D;
  --text:#111827;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── HEADER ── */
.site-header{background:var(--navy);padding:0;position:relative;overflow:hidden}
.site-header::before{content:'';position:absolute;right:-80px;top:-80px;width:320px;height:320px;border-radius:50%;background:rgba(58,134,212,.15);pointer-events:none}
.site-header::after{content:'';position:absolute;left:40%;bottom:-60px;width:200px;height:200px;border-radius:50%;background:rgba(232,160,32,.08);pointer-events:none}
.header-inner{max-width:1120px;margin:0 auto;padding:2rem 1.5rem;display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;position:relative;z-index:1}
.header-eyebrow{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.header-title{font-size:26px;font-weight:900;color:#fff;line-height:1.2}
.header-title span{color:var(--gold)}
.header-sub{margin-top:6px;font-size:13px;color:rgba(255,255,255,.55);font-weight:400}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0}
.csv-btn{display:flex;align-items:center;gap:6px;padding:9px 18px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:#fff;font-size:13px;font-weight:500;cursor:pointer;transition:background .15s;font-family:inherit}
.csv-btn:hover{background:rgba(255,255,255,.2)}

/* ── STAT STRIP ── */
.stat-strip{background:var(--white);border-bottom:1px solid var(--gray2)}
.stat-inner{max-width:1120px;margin:0 auto;padding:0 1.5rem;display:grid;grid-template-columns:repeat(4,1fr)}
.stat-cell{padding:1.125rem 1rem;border-right:1px solid var(--gray2);position:relative}
.stat-cell:last-child{border-right:none}
.stat-cell .lbl{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--gray4);margin-bottom:4px}
.stat-cell .num{font-size:28px;font-weight:900;line-height:1;color:var(--navy)}
.stat-cell .num.accent{color:var(--sky)}
.stat-cell .num.gold{color:var(--gold)}
.stat-cell .num.mint{color:var(--mint)}
.stat-cell .bar{position:absolute;bottom:0;left:0;height:3px;background:var(--gray2);right:0}
.stat-cell .bar-fill{height:100%;background:var(--sky);transition:width .6s cubic-bezier(.4,0,.2,1)}

/* ── MAIN LAYOUT ── */
.main{max-width:1120px;margin:0 auto;padding:2rem 1.5rem}
.section-label{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gray4);margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:var(--gray2)}

/* ── COLLEGE GRID ── */
.college-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(162px,1fr));gap:14px;margin-bottom:2.5rem}

/* ── CARD ── */
.card{background:var(--white);border-radius:14px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:transform .18s,box-shadow .18s,border-color .18s;position:relative}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(11,37,69,.14);border-color:var(--gray3)}
.card.done{border-color:var(--sky)}
.card.done:hover{border-color:var(--blue)}

/* card thumb */
.card-thumb{width:100%;min-height:136px;position:relative;overflow:hidden;background:var(--gray1)}
.card-icon-wrap{width:100%;height:136px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.card-icon-wrap i{font-size:38px}
.card-icon-wrap span{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--gray4)}
/* 예산 표 썸네일 */
.card-budget-table{width:100%;padding:10px 12px 8px;background:var(--white)}
.cb-header{display:grid;grid-template-columns:1fr auto auto;gap:4px;padding-bottom:5px;border-bottom:1.5px solid var(--navy);margin-bottom:4px}
.cb-header span{font-size:9px;font-weight:700;color:var(--navy);letter-spacing:.03em;text-transform:uppercase}
.cb-row{display:grid;grid-template-columns:1fr auto auto;gap:4px;padding:3px 0;border-bottom:0.5px solid var(--gray2)}
.cb-row:last-of-type{border-bottom:none}
.cb-row.total{border-top:1.5px solid var(--navy);border-bottom:none;margin-top:3px;padding-top:4px}
.cb-name{font-size:10px;color:var(--gray4);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.cb-amt{font-size:10px;color:var(--text);font-weight:600;white-space:nowrap;text-align:right}
.cb-note{font-size:9px;color:var(--gray3);white-space:nowrap;text-align:right;overflow:hidden;text-overflow:ellipsis;max-width:50px}
.cb-row.total .cb-name{font-weight:700;color:var(--navy);font-size:10px}
.cb-row.total .cb-amt{font-weight:700;color:var(--navy)}

/* card overlay on hover */
.card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(11,37,69,.85) 0%,rgba(11,37,69,.2) 60%,transparent 100%);opacity:0;transition:opacity .2s;display:flex;flex-direction:column;justify-content:flex-end;padding:12px}
.card:hover .card-overlay{opacity:1}
.card-overlay-label{color:#fff;font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px}

/* status badge */
.card-badge{position:absolute;top:10px;right:10px;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.card-badge.done{background:var(--mint);color:#fff}
.card-badge.none{background:rgba(255,255,255,.85);color:var(--gray4)}

/* card body */
.card-body{padding:11px 13px 13px}
.card-name{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:4px;line-height:1.3}
.card-meta{font-size:11px;color:var(--gray4);display:flex;align-items:center;gap:4px}
.card-cost{margin-top:5px;font-size:12px;font-weight:700;color:var(--sky)}

/* upload zone card */
.card-upload-hint{border:2px dashed var(--gray2);background:var(--gray1);transition:border-color .15s,background .15s}
.card-upload-hint:hover{border-color:var(--sky);background:#EEF5FC;transform:translateY(-4px);box-shadow:0 8px 24px rgba(58,134,212,.1)}

/* ── PROGRESS BAR ── */
.progress-block{background:var(--white);border-radius:14px;padding:1.25rem 1.5rem;margin-bottom:2rem}
.progress-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.progress-header h3{font-size:13px;font-weight:700;color:var(--navy)}
.progress-track{height:8px;background:var(--gray2);border-radius:4px;overflow:hidden;margin-bottom:14px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--sky),var(--mint));border-radius:4px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.pills{display:flex;flex-wrap:wrap;gap:6px}
.pill{padding:5px 11px;border-radius:20px;font-size:11px;font-weight:600}
.pill.done{background:#E8F7F5;color:#007A6A;border:1.5px solid #9FE0D6}
.pill.none{background:var(--gray1);color:var(--gray4);border:1.5px solid var(--gray2)}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(11,37,69,.65);z-index:200;align-items:flex-start;justify-content:center;padding:24px 16px;overflow-y:auto;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.modal{background:var(--white);border-radius:18px;width:100%;max-width:840px;margin:auto;overflow:hidden;box-shadow:0 24px 64px rgba(11,37,69,.25)}

/* modal header */
.mh{background:var(--navy);padding:1.125rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:12px;position:relative;overflow:hidden}
.mh::before{content:'';position:absolute;right:-40px;top:-40px;width:180px;height:180px;border-radius:50%;background:rgba(58,134,212,.2);pointer-events:none}
.mh-text{position:relative;z-index:1}
.mh-title{color:#fff;font-size:16px;font-weight:800}
.mh-sub{color:rgba(255,255,255,.5);font-size:12px;margin-top:2px}
.xbtn{background:rgba(255,255,255,.12);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;position:relative;z-index:1;transition:background .15s}
.xbtn:hover{background:rgba(255,255,255,.25)}

/* pdf viewer */
.pdf-toolbar{background:#1E2A3A;padding:8px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pdf-toolbar button{background:rgba(255,255,255,.12);border:none;color:#fff;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit;font-weight:500;display:flex;align-items:center;gap:4px;transition:background .15s}
.pdf-toolbar button:hover{background:rgba(255,255,255,.22)}
.pdf-toolbar .page-info{color:rgba(255,255,255,.5);font-size:12px;flex:1;text-align:center}
.pdf-pages{background:#555;padding:16px;display:flex;flex-direction:column;align-items:center;gap:12px;overflow:auto;max-height:65vh;width:100%}
.pdf-page-wrap{flex-shrink:0}
.pdf-page-wrap{border-radius:6px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.pdf-page-wrap canvas{display:block}

/* modal footer */
.mf{padding:1rem 1.5rem;border-top:1px solid var(--gray2);display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;align-items:center}
.btn{padding:9px 18px;border:1.5px solid var(--gray2);border-radius:9px;cursor:pointer;background:var(--white);color:var(--gray4);font-size:13px;font-weight:600;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:6px}
.btn:hover{background:var(--gray1);border-color:var(--gray3);color:var(--text)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.btn-primary:hover{background:var(--blue);border-color:var(--blue);color:#fff}
.btn-teal{background:var(--mint);color:#fff;border-color:var(--mint)}
.btn-teal:hover{background:#009A85;border-color:#009A85;color:#fff}
.btn-danger{color:#C0392B;border-color:#F5C6CB}
.btn-danger:hover{background:#FFF0F0;border-color:#e0aaaa;color:#C0392B}

/* upload modal */
.dropzone{border:2.5px dashed var(--gray2);border-radius:12px;padding:2.5rem 1.5rem;text-align:center;cursor:pointer;transition:all .18s;background:var(--gray1)}
.dropzone:hover,.dropzone.drag{background:#EEF5FC;border-color:var(--sky)}
.dropzone-icon{font-size:44px;color:var(--sky);display:block;margin-bottom:12px}
.dropzone-title{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:4px}
.dropzone-sub{font-size:12px;color:var(--gray4)}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.meta-grid .full{grid-column:1/-1}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--gray4)}
.fg input{font-size:13px;padding:9px 11px;border:1.5px solid var(--gray2);border-radius:8px;width:100%;outline:none;font-family:inherit;color:var(--text);transition:border-color .15s}
.fg input:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(58,134,212,.12)}
</style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="header-inner">
    <div>
      <div class="header-eyebrow">총학생회 공모사업 심사위원 포털</div>
      <div class="header-title">2026학년도 <span>교육환경개선사업</span></div>
      <div class="header-sub">16개 단과대학 신청서 열람 · 접수 현황 관리</div>
    </div>
    <div class="header-right">
      <button class="csv-btn" onclick="exportCSV()"><i class="ti ti-download"></i>현황 내보내기</button>
    </div>
  </div>
</header>

<!-- STAT STRIP -->
<div class="stat-strip">
  <div class="stat-inner">
    <div class="stat-cell">
      <div class="lbl">접수 완료</div>
      <div class="num accent" id="s-done">0</div>
      <div class="bar"><div class="bar-fill" id="bar-done" style="width:0%"></div></div>
    </div>
    <div class="stat-cell">
      <div class="lbl">미접수</div>
      <div class="num" id="s-remain">16</div>
      <div class="bar"><div class="bar-fill" style="width:100%;background:var(--gray3)"></div></div>
    </div>
    <div class="stat-cell">
      <div class="lbl">전체 단과대학</div>
      <div class="num">16</div>
      <div class="bar"><div class="bar-fill" style="width:100%;background:var(--navy)"></div></div>
    </div>
    <div class="stat-cell">
      <div class="lbl">총 신청금액(만원)</div>
      <div class="num gold" id="s-cost">—</div>
      <div class="bar"><div class="bar-fill" style="width:60%;background:var(--gold)"></div></div>
    </div>
  </div>
</div>

<!-- MAIN -->
<main class="main">

  <div class="section-label">신청서 현황</div>
  <div class="college-grid" id="college-grid"></div>

  <div class="section-label">접수 현황</div>
  <div class="progress-block">
    <div class="progress-header">
      <h3>단과대학별 접수 현황</h3>
      <span id="progress-label" style="font-size:13px;font-weight:700;color:var(--sky)">0 / 16</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="pills" id="pills"></div>
  </div>

</main>

<!-- PDF 뷰어 모달 -->
<div class="overlay" id="view-modal">
<div class="modal">
  <div class="mh">
    <div class="mh-text">
      <div class="mh-title" id="vm-title"></div>
      <div class="mh-sub" id="vm-sub"></div>
    </div>
    <button class="xbtn" onclick="closeView()"><i class="ti ti-x"></i></button>
  </div>
  <div style="background:#1E2A3A">
    <div class="pdf-toolbar">
      <button onclick="zoomOut()"><i class="ti ti-zoom-out"></i> 축소</button>
      <span class="page-info" id="page-info"></span>
      <button onclick="zoomIn()"><i class="ti ti-zoom-in"></i> 확대</button>
      <button onclick="downloadPDF()" style="margin-left:auto"><i class="ti ti-download"></i> 다운로드</button>
    </div>
    <div class="pdf-pages" id="pdf-pages">
      <div style="color:#aaa;padding:3rem;text-align:center;font-size:13px">PDF 불러오는 중...</div>
    </div>
  </div>
  <div class="mf">
    <button class="btn btn-danger" onclick="removePDF()"><i class="ti ti-trash"></i> 삭제</button>
    <button class="btn" onclick="closeView()">닫기</button>
    <button class="btn btn-teal" onclick="replaceUpload()"><i class="ti ti-refresh"></i> PDF 교체</button>
  </div>
</div>
</div>

<!-- 업로드 모달 -->
<div class="overlay" id="upload-modal">
<div class="modal" style="max-width:520px">
  <div class="mh">
    <div class="mh-text">
      <div class="mh-title" id="um-title">신청서 PDF 업로드</div>
      <div class="mh-sub">파일을 올리면 뷰어에서 바로 열람할 수 있습니다</div>
    </div>
    <button class="xbtn" onclick="closeUpload()"><i class="ti ti-x"></i></button>
  </div>
  <div style="padding:1.5rem">
    <div class="dropzone" id="dropzone"
      onclick="document.getElementById('file-input').click()"
      ondragover="event.preventDefault();this.classList.add('drag')"
      ondragleave="this.classList.remove('drag')"
      ondrop="handleDrop(event)">
      <i class="ti ti-file-type-pdf dropzone-icon"></i>
      <div class="dropzone-title" id="dz-title">PDF를 여기에 끌어다 놓거나 클릭해서 선택</div>
      <div class="dropzone-sub">신청서 PDF 파일 · 최대 20MB</div>
    </div>
    <input type="file" id="file-input" accept=".pdf,application/pdf" style="display:none" onchange="handleFile(event)">

    <div class="meta-grid">
      <div class="fg full"><label>신청사업명</label>
        <input id="m-project" placeholder="예: 2026학년도 총학생회 교육환경개선사업(학부)"></div>
      <div class="fg"><label>예상 소요기간</label>
        <input id="m-period" placeholder="예: 2026.07.20 ~ 07.27"></div>
      <div class="fg"><label>총 신청금액 (만원)</label>
        <input id="m-cost" type="number" placeholder="예: 4178"></div>
    </div>

    <div style="margin-top:16px">
      <div style="font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--gray4);margin-bottom:8px">소요 예산 항목</div>
      <div style="display:grid;grid-template-columns:1fr 120px 90px 28px;gap:6px;margin-bottom:6px">
        <span style="font-size:10px;color:var(--gray4);font-weight:600">항목명</span>
        <span style="font-size:10px;color:var(--gray4);font-weight:600">금액(원)</span>
        <span style="font-size:10px;color:var(--gray4);font-weight:600">비고</span>
        <span></span>
      </div>
      <div id="m-budget-rows"></div>
      <button type="button" onclick="addBudgetRow()" style="width:100%;margin-top:6px;padding:8px;border:1.5px dashed var(--gray2);border-radius:8px;background:transparent;color:var(--gray4);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s" onmouseover="this.style.borderColor='var(--sky)';this.style.color='var(--sky)'" onmouseout="this.style.borderColor='var(--gray2)';this.style.color='var(--gray4)'">
        <i class="ti ti-plus" style="margin-right:4px"></i>항목 추가
      </button>
    </div>
    <p style="font-size:11px;color:var(--gray3);margin-top:10px;text-align:center">항목은 나중에도 수정 가능합니다</p>
  </div>
  <div class="mf">
    <button class="btn" onclick="closeUpload()">취소</button>
    <button class="btn btn-primary" id="upload-btn" onclick="confirmUpload()" disabled><i class="ti ti-check"></i> 등록</button>
  </div>
</div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const COLLEGES=[
  {id:'간호대학',   ic:'ti-heart-rate-monitor', co:'#D4537E', bg:'#FDF0F4'},
  {id:'경영대학',   ic:'ti-chart-line',          co:'#3A86D4', bg:'#EEF5FC'},
  {id:'경제금융대학',ic:'ti-coin',               co:'#C07A00', bg:'#FBF3E3'},
  {id:'공과대학',   ic:'ti-tools',               co:'#4A6278', bg:'#EEF1F5'},
  {id:'국제대학',   ic:'ti-world',               co:'#1D9E75', bg:'#E6F7F3'},
  {id:'기술혁신대학',ic:'ti-circuit-board',      co:'#6B4FB5', bg:'#F0ECF9'},
  {id:'사범대학',   ic:'ti-pencil',              co:'#C04D20', bg:'#FAF0EB'},
  {id:'사회과학대학',ic:'ti-users',              co:'#1B4F8A', bg:'#EAF0F8'},
  {id:'생활과학대학',ic:'ti-home-2',             co:'#3B7A1A', bg:'#EBF5E3'},
  {id:'예술·체육대학',ic:'ti-palette',           co:'#993556', bg:'#F7EBF0'},
  {id:'음악대학',   ic:'ti-music',               co:'#6B5ECC', bg:'#EFECF9'},
  {id:'의과대학',   ic:'ti-stethoscope',         co:'#A32D2D', bg:'#F7ECEC'},
  {id:'인문과학대학',ic:'ti-book',               co:'#7A4A0A', bg:'#F5EFE5'},
  {id:'자연과학대학',ic:'ti-flask',              co:'#0A6E5A', bg:'#E5F3EF'},
  {id:'정책과학대학',ic:'ti-building-bank',      co:'#1B4F8A', bg:'#EAF0F8'},
  {id:'한양YK인터칼리지',ic:'ti-school',         co:'#3C3489', bg:'#EEEDF8'}
];

const store={};
COLLEGES.forEach(c=>{store[c.id]={pdfDataUrl:null,thumbSrc:null,project:'',period:'',cost:'',budgets:[]};});
let currentCollege=null,currentPDF=null,currentScale=1.0,pendingFile=null;

/* ── 그리드 렌더 ── */
function renderGrid(){
  const g=document.getElementById('college-grid');g.innerHTML='';
  COLLEGES.forEach(c=>{
    const d=store[c.id];const has=!!d.pdfDataUrl;
    const card=document.createElement('div');
    card.className='card'+(has?' done':' card-upload-hint');
    card.onclick=()=>has?openView(c.id):openUpload(c.id);

    // 썸네일: 예산 표 or 아이콘
    let thumbContent='';
    if(has && d.budgets && d.budgets.length){
      const totalAmt=d.budgets.reduce((s,b)=>s+(parseInt((b.amt||'').replace(/[^0-9]/g,''))||0),0);
      const rows=d.budgets.map(b=>{
        const a=parseInt((b.amt||'').replace(/[^0-9]/g,''))||0;
        return `<div class="cb-row">
          <span class="cb-name">${b.name||'-'}</span>
          <span class="cb-amt">${a.toLocaleString()}</span>
          <span class="cb-note">${b.note||''}</span>
        </div>`;
      }).join('');
      thumbContent=`<div class="card-budget-table">
        <div class="cb-header">
          <span>항목</span><span>금액(원)</span><span>비고</span>
        </div>
        ${rows}
        <div class="cb-row total">
          <span class="cb-name">합 계</span>
          <span class="cb-amt">${totalAmt.toLocaleString()}</span>
          <span class="cb-note"></span>
        </div>
      </div>`;
    } else {
      thumbContent=`<div class="card-icon-wrap" style="background:${c.bg}">
        <i class="ti ${c.ic}" style="color:${c.co}"></i>
        <span style="color:${c.co}">${has?'표 정보 미입력':'업로드'}</span>
      </div>`;
    }

    card.innerHTML=`
      <div class="card-thumb" style="${(has&&d.budgets&&d.budgets.length)?'':'background:'+c.bg}">
        ${thumbContent}
        <div class="card-overlay">
          <div class="card-overlay-label">
            <i class="ti ${has?'ti-eye':'ti-upload'}"></i>
            ${has?'신청서 열기':'PDF 업로드'}
          </div>
        </div>
        <span class="card-badge ${has?'done':'none'}">${has?'접수':'대기'}</span>
      </div>
      <div class="card-body">
        <div class="card-name">${c.id}</div>
        ${d.project
          ?`<div class="card-meta"><i class="ti ti-file-text" style="font-size:11px"></i><span style="overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${d.project.length>16?d.project.slice(0,16)+'…':d.project}</span></div>`
          :`<div class="card-meta" style="color:var(--gray3)">${has?'정보 미입력':'신청서 없음'}</div>`
        }
        ${d.cost?`<div class="card-cost">${parseInt(d.cost).toLocaleString()}만원</div>`:''}
      </div>`;
    g.appendChild(card);
  });
  updateStats();
}

function updateStats(){
  const done=COLLEGES.filter(c=>store[c.id].pdfDataUrl).length;
  const pct=Math.round(done/16*100);
  document.getElementById('s-done').textContent=done;
  document.getElementById('s-remain').textContent=16-done;
  document.getElementById('bar-done').style.width=pct+'%';
  const tot=COLLEGES.reduce((s,c)=>s+(parseInt(store[c.id].cost)||0),0);
  document.getElementById('s-cost').textContent=tot?tot.toLocaleString():'—';
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-label').textContent=done+' / 16';

  const pills=document.getElementById('pills');pills.innerHTML='';
  COLLEGES.forEach(c=>{
    const has=!!store[c.id].pdfDataUrl;
    const pill=document.createElement('span');
    pill.className='pill '+(has?'done':'none');
    pill.innerHTML=has?`<i class="ti ti-check" style="font-size:10px;margin-right:2px"></i>${c.id}`:c.id;
    pills.appendChild(pill);
  });
}

function addBudgetRow(name,amt,note){
  const wrap=document.getElementById('m-budget-rows');
  const row=document.createElement('div');
  row.style.cssText='display:grid;grid-template-columns:1fr 120px 90px 28px;gap:6px;margin-bottom:6px;align-items:center';
  const si='font-size:12px;padding:7px 9px;border:1.5px solid var(--gray2);border-radius:7px;width:100%;outline:none;font-family:inherit;color:var(--text);transition:border-color .15s';
  row.innerHTML=`<input placeholder="예: 천정형 냉난방기 설치" value="${name||''}" style="${si}" onfocus="this.style.borderColor='var(--sky)'" onblur="this.style.borderColor='var(--gray2)'">
    <input placeholder="21784000" value="${amt||''}" style="${si}" onfocus="this.style.borderColor='var(--sky)'" onblur="this.style.borderColor='var(--gray2)'">
    <input placeholder="비고" value="${note||''}" style="${si}" onfocus="this.style.borderColor='var(--sky)'" onblur="this.style.borderColor='var(--gray2)'">
    <button type="button" onclick="this.parentElement.remove()" style="background:transparent;border:none;cursor:pointer;color:var(--gray3);font-size:18px;padding:0;display:flex;align-items:center;justify-content:center;transition:color .15s" onmouseover="this.style.color='#C0392B'" onmouseout="this.style.color='var(--gray3)'"><i class="ti ti-x"></i></button>`;
  wrap.appendChild(row);
}

function getBudgets(){
  const rows=document.querySelectorAll('#m-budget-rows > div');
  return Array.from(rows).map(r=>{
    const ins=r.querySelectorAll('input');
    return{name:ins[0].value.trim(),amt:ins[1].value.trim(),note:ins[2].value.trim()};
  }).filter(b=>b.name||b.amt);
}
function openUpload(id){
  currentCollege=id;pendingFile=null;
  document.getElementById('um-title').textContent=id+' — PDF 업로드';
  document.getElementById('dz-title').textContent='PDF를 여기에 끌어다 놓거나 클릭해서 선택';
  document.getElementById('dropzone').style.borderColor='';
  document.getElementById('dropzone').classList.remove('drag');
  document.getElementById('file-input').value='';
  const d=store[id];
  document.getElementById('m-project').value=d.project||'';
  document.getElementById('m-period').value=d.period||'';
  document.getElementById('m-cost').value=d.cost||'';
  document.getElementById('m-budget-rows').innerHTML='';
  if(d.budgets&&d.budgets.length){d.budgets.forEach(b=>addBudgetRow(b.name,b.amt,b.note));}
  else{addBudgetRow();}
  document.getElementById('upload-btn').disabled=true;
  document.getElementById('upload-modal').classList.add('open');
}
function closeUpload(){document.getElementById('upload-modal').classList.remove('open');}
function replaceUpload(){closeView();openUpload(currentCollege);}

function handleDrop(e){
  e.preventDefault();document.getElementById('dropzone').classList.remove('drag');
  const f=e.dataTransfer.files[0];
  if(f&&f.type==='application/pdf')setFile(f);
  else alert('PDF 파일만 업로드할 수 있습니다.');
}
function handleFile(e){const f=e.target.files[0];if(f)setFile(f);}
function setFile(f){
  pendingFile=f;
  document.getElementById('dz-title').textContent='✓  '+f.name;
  document.getElementById('dropzone').style.borderColor='var(--mint)';
  document.getElementById('upload-btn').disabled=false;
}

async function confirmUpload(){
  if(!pendingFile||!currentCollege)return;
  const btn=document.getElementById('upload-btn');
  btn.disabled=true;btn.innerHTML='<i class="ti ti-loader" style="animation:spin .8s linear infinite;display:inline-block"></i> 처리 중...';
  const reader=new FileReader();
  reader.onload=async e=>{
    const dataUrl=e.target.result;
    const d=store[currentCollege];
    d.pdfDataUrl=dataUrl;
    d.project=document.getElementById('m-project').value.trim();
    d.period=document.getElementById('m-period').value.trim();
    d.cost=document.getElementById('m-cost').value.trim();
    d.budgets=getBudgets();
    closeUpload();renderGrid();
    setTimeout(()=>openView(currentCollege),120);
  };
  reader.readAsDataURL(pendingFile);
}

/* ── PDF 뷰어 ── */
async function openView(id){
  currentCollege=id;const d=store[id];
  document.getElementById('vm-title').textContent=id;
  document.getElementById('vm-sub').textContent=d.project||'2026학년도 총학생회 교육환경개선사업 신청서';
  document.getElementById('view-modal').classList.add('open');
  currentScale=1.0;
  await loadPDF(d.pdfDataUrl);
}
function closeView(){
  document.getElementById('view-modal').classList.remove('open');
  document.getElementById('pdf-pages').innerHTML='';
  currentPDF=null;
}

async function loadPDF(dataUrl){
  const pages=document.getElementById('pdf-pages');
  pages.innerHTML='<div style="color:#aaa;padding:3rem;text-align:center;font-size:13px"><i class="ti ti-loader" style="font-size:24px;display:block;margin-bottom:8px"></i>PDF 불러오는 중...</div>';
  try{
    currentPDF=await pdfjsLib.getDocument(dataUrl).promise;
    document.getElementById('page-info').textContent='전체 '+currentPDF.numPages+'페이지';
    await renderPages();
  }catch(err){
    pages.innerHTML=`<div style="color:#f99;padding:2rem;text-align:center;font-size:13px">PDF 로드 실패: ${err.message}</div>`;
  }
}

async function renderPages(){
  if(!currentPDF)return;
  const pages=document.getElementById('pdf-pages');
  pages.innerHTML='';
  // 컨테이너 가용 너비 계산 (패딩 32px 제외)
  const containerW=pages.clientWidth-32||700;
  for(let i=1;i<=currentPDF.numPages;i++){
    const page=await currentPDF.getPage(i);
    // 기본 뷰포트로 원본 너비 파악
    const baseVp=page.getViewport({scale:1});
    // 컨테이너에 맞는 스케일 × currentScale 배율 적용
    const fitScale=(containerW/baseVp.width)*currentScale;
    const vp=page.getViewport({scale:fitScale});
    const wrap=document.createElement('div');
    wrap.className='pdf-page-wrap';
    const canvas=document.createElement('canvas');
    canvas.width=Math.floor(vp.width);
    canvas.height=Math.floor(vp.height);
    canvas.style.width=Math.floor(vp.width)+'px';
    canvas.style.height=Math.floor(vp.height)+'px';
    wrap.appendChild(canvas);
    pages.appendChild(wrap);
    await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
  }
  document.getElementById('page-info').textContent='전체 '+currentPDF.numPages+'페이지  |  '+Math.round(currentScale*100)+'%';
}
async function zoomIn(){if(currentScale<3){currentScale=Math.round((currentScale+0.2)*10)/10;await renderPages();}}
async function zoomOut(){if(currentScale>0.4){currentScale=Math.round((currentScale-0.2)*10)/10;await renderPages();}}

function downloadPDF(){
  const d=store[currentCollege];if(!d.pdfDataUrl)return;
  const a=document.createElement('a');a.href=d.pdfDataUrl;
  a.download=currentCollege+'_신청서.pdf';a.click();
}
function removePDF(){
  if(!confirm(currentCollege+' 신청서를 삭제하시겠습니까?'))return;
  store[currentCollege]={pdfDataUrl:null,thumbSrc:null,project:'',period:'',cost:''};
  closeView();renderGrid();
}

/* ── CSV ── */
function exportCSV(){
  const rows=COLLEGES.map(c=>{const d=store[c.id];return[c.id,d.pdfDataUrl?'접수완료':'미접수',d.project||'',d.period||'',d.cost?d.cost+'만원':''];});
  const h=['단과대학','접수여부','신청사업명','소요기간','총금액'];
  const csv=[h,...rows].map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download='교육환경개선사업_접수현황_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

/* spin animation */
const style=document.createElement('style');
style.textContent='@keyframes spin{to{transform:rotate(360deg)}}';
document.head.appendChild(style);

renderGrid();
</script>
</body>
</html>
